<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>電子組態大賽 - Ethersboy 醚樣男子</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #74ebd5, #acb6e5); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #game-container { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 20px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); position: relative; overflow: hidden; }
    h1 { color: #333; font-size: 24px; margin-bottom: 15px; text-align: center; }
    #mode-toggle { display: flex; justify-content: center; margin-bottom: 10px; }
    #mode-toggle button { margin: 0 5px; padding: 8px 16px; border: none; border-radius: 8px; background: #3498db; color: white; cursor: pointer; font-weight: bold; }
    #mode-toggle button.active { background: #2ecc71; }
    #timer { font-size: 20px; color: #e74c3c; margin: 10px 0; font-weight: bold; text-align: center; }
    #question { font-size: 18px; color: #2c3e50; margin: 10px 0; text-align: center; min-height: 50px; font-weight: bold; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .option { background: #ecf0f1; padding: 12px; border-radius: 10px; cursor: pointer; transition: all 0.3s; font-size: 14px; border: 2px solid #bdc3c7; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 50px; }
    .option:hover { background: #dfe6e9; transform: translateY(-2px); }
    .option.correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
    .option.wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
    #result { font-size: 16px; margin: 10px 0; color: #34495e; text-align: center; font-weight: bold; min-height: 24px; }
    #scoreboard { margin-top: 15px; padding: 10px; background: rgba(236, 240, 241, 0.8); border-radius: 10px; }
    #scoreboard h2 { margin: 0 0 5px; color: #2980b9; font-size: 18px; }
    #ranking { list-style: none; padding: 0; font-size: 14px; color: #7f8c8d; margin: 0; }
    #ethersboy { position: absolute; bottom: 10px; right: 10px; font-size: 14px; color: #e67e22; font-weight: bold; background: rgba(255, 255, 255, 0.7); padding: 4px 8px; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="game-container">
    <h1>電子組態大賽</h1>
    <div id="mode-toggle">
      <button id="standardBtn" class="active">標準模式</button>
      <button id="advancedBtn">進階模式</button>
    </div>
    <div id="timer">剩餘時間: 2:00</div>
    <div id="question">載入中...</div>
    <div class="options" id="options"></div>
    <div id="result"></div>
    <div id="scoreboard">
      <h2>得分: <span id="score">0</span> 酚</h2>
      <h3>前五名排行榜</h3>
      <ol id="ranking"></ol>
    </div>
    <div id="ethersboy">Ethersboy 醚樣男子</div>
  </div>

  <script>
    const elements = {
      1: { symbol: "H", name: "氫", config: "1s1" },
      2: { symbol: "He", name: "氦", config: "1s2" },
      3: { symbol: "Li", name: "鋰", config: "[He] 2s1" },
      4: { symbol: "Be", name: "鈹", config: "[He] 2s2" },
      5: { symbol: "B", name: "硼", config: "[He] 2s2 2p1" },
      6: { symbol: "C", name: "碳", config: "[He] 2s2 2p2" },
      7: { symbol: "N", name: "氮", config: "[He] 2s2 2p3" },
      8: { symbol: "O", name: "氧", config: "[He] 2s2 2p4" },
      9: { symbol: "F", name: "氟", config: "[He] 2s2 2p5" },
      10: { symbol: "Ne", name: "氖", config: "[He] 2s2 2p6" },
      11: { symbol: "Na", name: "鈉", config: "[Ne] 3s1" },
      12: { symbol: "Mg", name: "鎂", config: "[Ne] 3s2" },
      13: { symbol: "Al", name: "鋁", config: "[Ne] 3s2 3p1" },
      14: { symbol: "Si", name: "矽", config: "[Ne] 3s2 3p2" },
      15: { symbol: "P", name: "磷", config: "[Ne] 3s2 3p3" },
      16: { symbol: "S", name: "硫", config: "[Ne] 3s2 3p4" },
      17: { symbol: "Cl", name: "氯", config: "[Ne] 3s2 3p5" },
      18: { symbol: "Ar", name: "氬", config: "[Ne] 3s2 3p6" },
      19: { symbol: "K", name: "鉀", config: "[Ar] 4s1" },
      20: { symbol: "Ca", name: "鈣", config: "[Ar] 4s2" },
      21: { symbol: "Sc", name: "鈧", config: "[Ar] 4s2 3d1" },
      22: { symbol: "Ti", name: "鈦", config: "[Ar] 4s2 3d2" },
      23: { symbol: "V", name: "釩", config: "[Ar] 4s2 3d3" },
      24: { symbol: "Cr", name: "鉻", config: "[Ar] 4s1 3d5", trap: "[Ar] 4s2 3d4" },
      25: { symbol: "Mn", name: "錳", config: "[Ar] 4s2 3d5" },
      26: { symbol: "Fe", name: "鐵", config: "[Ar] 4s2 3d6" },
      27: { symbol: "Co", name: "鈷", config: "[Ar] 4s2 3d7" },
      28: { symbol: "Ni", name: "鎳", config: "[Ar] 4s2 3d8" },
      29: { symbol: "Cu", name: "銅", config: "[Ar] 4s1 3d10", trap: "[Ar] 4s2 3d9" },
      30: { symbol: "Zn", name: "鋅", config: "[Ar] 4s2 3d10" }
    };

    let score = 0;
    let timeLeft = 120;
    let timerInterval;
    let currentKey;
    let isAdvanced = false;
    let rankings = JSON.parse(localStorage.getItem('rankings')) || [];

    document.getElementById('standardBtn').addEventListener('click', () => { isAdvanced = false; updateMode(); });
    document.getElementById('advancedBtn').addEventListener('click', () => { isAdvanced = true; updateMode(); });

    function updateMode() {
      document.getElementById('standardBtn').classList.toggle('active', !isAdvanced);
      document.getElementById('advancedBtn').classList.toggle('active', isAdvanced);
      initGame();
    }

    function initGame() {
      clearInterval(timerInterval);
      score = 0;
      timeLeft = 120;
      document.getElementById('score').textContent = score;
      document.getElementById('result').textContent = '';
      updateRankingDisplay();
      nextQuestion();
      startTimer();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const min = Math.floor(timeLeft / 60);
        const sec = timeLeft % 60;
        document.getElementById('timer').textContent = `剩餘時間: ${min}:${sec < 10 ? '0' + sec : sec}`;
        if (timeLeft <= 0) finishGame();
      }, 1000);
    }

    function nextQuestion() {
      const keys = Object.keys(elements);
      currentKey = keys[Math.floor(Math.random() * keys.length)];
      const item = elements[currentKey];

      document.getElementById('question').textContent = isAdvanced 
        ? 請選出 ${item.symbol} 的電子組態： 
        : `請選出 ${item.name} (${currentKey}號) 的組態：`;
      
      document.getElementById('result').textContent = '';
      renderOptions(item);
    }

    function renderOptions(item) {
      const optionSet = new Set();
      optionSet.add(item.config);
      if (item.trap) optionSet.add(item.trap);

      const configs = Object.values(elements).map(e => e.config);
      while (optionSet.size < 4) {
        optionSet.add(configs[Math.floor(Math.random() * configs.length)]);
      }

      const optionsArray = Array.from(optionSet).sort(() => Math.random() - 0.5);
      const container = document.getElementById('options');
      container.innerHTML = '';

      optionsArray.forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => verifyAnswer(opt, item.config, btn);
        container.appendChild(btn);
      });
    }

    function verifyAnswer(selected, correct, btn) {
      const allOptions = document.querySelectorAll('.option');
      allOptions.forEach(o => o.onclick = null);

      if (selected === correct) {
        btn.classList.add('correct');
        score++;
        document.getElementById('result').textContent = '答對了！+1 酚';
      } else {
        btn.classList.add('wrong');
        allOptions.forEach(o => { if(o.textContent === correct) o.classList.add('correct'); });
        let feedback = `錯囉！正確是 ${correct}`;
        if (currentKey == 24 || currentKey == 29) feedback += " (注意全滿/半滿！)";
        document.getElementById('result').textContent = feedback;
      }

      document.getElementById('score').textContent = score;
      setTimeout(nextQuestion, 1500);
    }

    function finishGame() {
      clearInterval(timerInterval);
      document.getElementById('question').textContent = '遊戲結束！';
      document.getElementById('options').innerHTML = '';
      document.getElementById('result').textContent = `最終獲得 ${score} 酚！`;
      
      rankings.push(score);
      rankings.sort((a, b) => b - a);
      rankings = rankings.slice(0, 5);
      localStorage.setItem('rankings', JSON.stringify(rankings));
      updateRankingDisplay();
    }

    function updateRankingDisplay() {
      const list = document.getElementById('ranking');
      list.innerHTML = rankings.map((s, i) => `<li>第 ${i+1} 名：${s} 酚</li>`).join('');
    }

    initGame();
  </script>
</body>
</html>
