<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>電子組態大賽 - Ethersboy 醚樣男子</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', "Microsoft JhengHei", Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #game-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 20px;
      width: 95%;
      max-width: 480px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 15px;
      text-align: center;
    }
    #mode-toggle {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    #mode-toggle button {
      margin: 0 5px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    #mode-toggle button.active {
      background: #2ecc71;
    }
    #timer {
      font-size: 20px;
      color: #e74c3c;
      margin: 10px 0;
      font-weight: bold;
      text-align: center;
    }
    #question {
      font-size: 18px;
      color: #2c3e50;
      margin: 10px 0;
      text-align: center;
      min-height: 50px;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .option {
      background: #ecf0f1;
      padding: 15px 5px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      border: 2px solid #bdc3c7;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-all;
    }
    .option:hover {
      background: #dfe6e9;
      transform: translateY(-2px);
    }
    .option.correct {
      background: #2ecc71 !important;
      color: white;
      border-color: #27ae60;
    }
    .option.wrong {
      background: #e74c3c !important;
      color: white;
      border-color: #c0392b;
    }
    #result {
      font-size: 16px;
      margin: 10px 0;
      height: 24px;
      color: #34495e;
      text-align: center;
      font-weight: bold;
    }
    #scoreboard {
      margin-top: 15px;
      padding: 10px;
      background: rgba(236, 240, 241, 0.8);
      border-radius: 10px;
    }
    #scoreboard h2, #scoreboard h3 {
      margin: 5px 0;
      color: #2980b9;
    }
    #ranking {
      list-style: none;
      padding: 0;
      font-size: 14px;
      color: #7f8c8d;
    }
    #ethersboy {
      position: absolute;
      bottom: 5px;
      right: 10px;
      font-size: 12px;
      color: #e67e22;
      font-weight: bold;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <h1>電子組態大賽</h1>
    <div id="mode-toggle">
      <button id="standardBtn" class="active">標準模式</button>
      <button id="advancedBtn">進階模式</button>
    </div>
    <div id="timer">剩餘時間: 2:00</div>
    <div id="question">載入中...</div>
    <div class="options" id="options"></div>
    <div id="result"></div>
    <div id="scoreboard">
      <h2>得分: <span id="score">0</span> 酚</h2>
      <h3>排行榜 (Top 5)</h3>
      <ol id="ranking"></ol>
    </div>
    <div id="ethersboy">Ethersboy 醚樣男子</div>
  </div>

  <script>
    const elements = {
      1: { symbol: "H", name: "氫", config: "1s1" },
      2: { symbol: "He", name: "氦", config: "1s2" },
      3: { symbol: "Li", name: "鋰", config: "[He] 2s1" },
      4: { symbol: "Be", name: "鈹", config: "[He] 2s2" },
      5: { symbol: "B", name: "硼", config: "[He] 2s2 2p1" },
      6: { symbol: "C", name: "碳", config: "[He] 2s2 2p2" },
      7: { symbol: "N", name: "氮", config: "[He] 2s2 2p3" },
      8: { symbol: "O", name: "氧", config: "[He] 2s2 2p4" },
      9: { symbol: "F", name: "氟", config: "[He] 2s2 2p5" },
      10: { symbol: "Ne", name: "氖", config: "[He] 2s2 2p6" },
      11: { symbol: "Na", name: "鈉", config: "[Ne] 3s1" },
      12: { symbol: "Mg", name: "鎂", config: "[Ne] 3s2" },
      13: { symbol: "Al", name: "鋁", config: "[Ne] 3s2 3p1" },
      14: { symbol: "Si", name: "矽", config: "[Ne] 3s2 3p2" },
      15: { symbol: "P", name: "磷", config: "[Ne] 3s2 3p3" },
      16: { symbol: "S", name: "硫", config: "[Ne] 3s2 3p4" },
      17: { symbol: "Cl", name: "氯", config: "[Ne] 3s2 3p5" },
      18: { symbol: "Ar", name: "氬", config: "[Ne] 3s2 3p6" },
      19: { symbol: "K", name: "鉀", config: "[Ar] 4s1" },
      20: { symbol: "Ca", name: "鈣", config: "[Ar] 4s2" },
      21: { symbol: "Sc", name: "鈧", config: "[Ar] 4s2 3d1" },
      22: { symbol: "Ti", name: "鈦", config: "[Ar] 4s2 3d2" },
      23: { symbol: "V", name: "釩", config: "[Ar] 4s2 3d3" },
      24: { symbol: "Cr", name: "鉻", config: "[Ar] 4s1 3d5" },
      25: { symbol: "Mn", name: "錳", config: "[Ar] 4s2 3d5" },
      26: { symbol: "Fe", name: "鐵", config: "[Ar] 4s2 3d6" },
      27: { symbol: "Co", name: "鈷", config: "[Ar] 4s2 3d7" },
      28: { symbol: "Ni", name: "鎳", config: "[Ar] 4s2 3d8" },
      29: { symbol: "Cu", name: "銅", config: "[Ar] 4s1 3d10" },
      30: { symbol: "Zn", name: "鋅", config: "[Ar] 4s2 3d10" },
    };

    let score = 0;
    let timeLeft = 120;
    let timer;
    let currentElement;
    let currentZ;
    let isAdvanced = false;
    let rankings = JSON.parse(localStorage.getItem('rankings')) || [];

    document.getElementById('standardBtn').onclick = () => {
      isAdvanced = false;
      setModeButtons();
    };
    document.getElementById('advancedBtn').onclick = () => {
      isAdvanced = true;
      setModeButtons();
    };

    function setModeButtons() {
      document.getElementById('standardBtn').classList.toggle('active', !isAdvanced);
      document.getElementById('advancedBtn').classList.toggle('active', isAdvanced);
      resetGame();
    }

    function resetGame() {
      clearInterval(timer);
      score = 0;
      timeLeft = 120;
      document.getElementById('score').textContent = score;
      startGame();
    }

    function startGame() {
      updateRanking();
      nextQuestion();
      timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
      timeLeft--;
      if (timeLeft <= 0) {
        timeLeft = 0;
        endGame();
      }
      let min = Math.floor(timeLeft / 60);
      let sec = timeLeft % 60;
      document.getElementById('timer').textContent = `剩餘時間: ${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function nextQuestion() {
      const keys = Object.keys(elements);
      currentZ = keys[Math.floor(Math.random() * keys.length)];
      currentElement = elements[currentZ];

      const questionText = isAdvanced
        ? `請選出元素 ${currentElement.symbol} 的電子組態：`
        : `請選出 ${currentElement.name} (原子序 ${currentZ}) 的電子組態：`;

      document.getElementById('question').textContent = questionText;
      document.getElementById('result').textContent = '';
      generateOptions();
    }

    function generateOptions() {
      const correct = currentElement.config;
      let options = [correct];
      const z = parseInt(currentZ);

      while (options.length < 4) {
        let randConfig;
        
        // --- 核心邏輯微調：如果題目在 21-30 區間 ---
        if (z >= 21 && z <= 30) {
          // 強制從 21-30 號元素中挑選干擾項，確保都有 d 軌域
          const dKey = Math.floor(Math.random() * 10) + 21;
          randConfig = elements[dKey].config;
        } else {
          // 20 號以前的題目，從 1-20 號挑選干擾項
          const sKey = Math.floor(Math.random() * 20) + 1;
          randConfig = elements[sKey].config;
        }

        if (!options.includes(randConfig)) {
          options.push(randConfig);
        }
      }

      // 隨機洗牌
      options.sort(() => Math.random() - 0.5);

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';
      options.forEach(opt => {
        const div = document.createElement('div');
        div.className = 'option';
        div.textContent = opt;
        div.onclick = () => checkAnswer(opt);
        optionsDiv.appendChild(div);
      });
    }

    function checkAnswer(selected) {
      const correct = currentElement.config;
      const options = document.querySelectorAll('.option');

      options.forEach(opt => {
        opt.onclick = null; // 防止重複點擊
        if (opt.textContent === correct) opt.classList.add('correct');
        if (opt.textContent === selected && selected !== correct) opt.classList.add('wrong');
      });

      if (selected === correct) {
        score++;
        document.getElementById('result').textContent = '答對！得1酚';
        document.getElementById('result').style.color = '#2ecc71';
      } else {
        document.getElementById('result').textContent = `答錯！正確答案是 ${correct}`;
        document.getElementById('result').style.color = '#e74c3c';
      }

      document.getElementById('score').textContent = score;
      setTimeout(nextQuestion, 1200);
    }

    function endGame() {
      clearInterval(timer);
      document.getElementById('question').textContent = '遊戲結束！';
      document.getElementById('options').innerHTML = '';
      document.getElementById('result').textContent = `最終得分: ${score} 酚`;

      rankings.push(score);
      rankings.sort((a, b) => b - a);
      rankings = rankings.slice(0, 5);
      localStorage.setItem('rankings', JSON.stringify(rankings));
      updateRanking();
    }

    function updateRanking() {
      const list = document.getElementById('ranking');
      list.innerHTML = '';
      rankings.forEach((s, i) => {
        const li = document.createElement('li');
        li.textContent = `第 ${i + 1} 名: ${s} 酚`;
        list.appendChild(li);
      });
    }

    startGame();
  </script>
</body>
</html>
