<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子組態大賽</title>
    <style>
        body { font-family: sans-serif; background: #eef2f5; text-align: center; padding: 20px; }
        #game-box { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .opt-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        #q-text { font-size: 22px; font-weight: bold; margin: 20px 0; color: #2c3e50; }
        #feedback { font-weight: bold; height: 24px; color: #e67e22; }
        .start-btn { background: #2ecc71; padding: 20px; font-size: 20px; }
    </style>
</head>
<body>

<div id="game-box">
    <h2>電子組態大賽 (1-30)</h2>
    <div id="timer" style="color:red; font-weight:bold;">時間：120s</div>
    
    <div id="main-area">
        <button class="opt-btn start-btn" onclick="init()">點擊開始遊戲</button>
        <p style="font-size:12px; color:gray;">(如果畫面卡住，請點擊上方按鈕)</p>
    </div>

    <div id="feedback"></div>
    <div style="margin-top:20px;">目前得分：<span id="score">0</span></div>
</div>

<script>
    var elements = {
        1: ["H", "1s1"], 2: ["He", "1s2"], 3: ["Li", "[He] 2s1"], 4: ["Be", "[He] 2s2"], 5: ["B", "[He] 2s2 2p1"],
        6: ["C", "[He] 2s2 2p2"], 7: ["N", "[He] 2s2 2p3"], 8: ["O", "[He] 2s2 2p4"], 9: ["F", "[He] 2s2 2p5"], 10: ["Ne", "[He] 2s2 2p6"],
        11: ["Na", "[Ne] 3s1"], 12: ["Mg", "[Ne] 3s2"], 13: ["Al", "[Ne] 3s2 3p1"], 14: ["Si", "[Ne] 3s2 3p2"], 15: ["P", "[Ne] 3s2 3p3"],
        16: ["S", "[Ne] 3s2 3p4"], 17: ["Cl", "[Ne] 3s2 3p5"], 18: ["Ar", "[Ne] 3s2 3p6"], 19: ["K", "[Ar] 4s1"], 20: ["Ca", "[Ar] 4s2"],
        21: ["Sc", "[Ar] 4s2 3d1"], 22: ["Ti", "[Ar] 4s2 3d2"], 23: ["V", "[Ar] 4s2 3d3"], 24: ["Cr", "[Ar] 4s1 3d5"], 25: ["Mn", "[Ar] 4s2 3d5"],
        26: ["Fe", "[Ar] 4s2 3d6"], 27: ["Co", "[Ar] 4s2 3d7"], 28: ["Ni", "[Ar] 4s2 3d8"], 29: ["Cu", "[Ar] 4s1 3d10"], 30: ["Zn", "[Ar] 4s2 3d10"]
    };

    var score = 0;
    var timeLeft = 120;
    var currentNum;

    function init() {
        score = 0;
        timeLeft = 120;
        document.getElementById('score').innerText = score;
        
        // 啟動計時器
        var timerInterval = setInterval(function() {
            timeLeft--;
            document.getElementById('timer').innerText = "時間：" + timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('main-area').innerHTML = "<h3>遊戲結束！總分：" + score + "</h3><button class='opt-btn' onclick='location.reload()'>再玩一次</button>";
            }
        }, 1000);

        renderQuestion();
    }

    function renderQuestion() {
        var keys = Object.keys(elements);
        currentNum = keys[Math.floor(Math.random() * keys.length)];
        var correctConfig = elements[currentNum][1];
        var symbol = elements[currentNum][0];

        // 建立題目 HTML
        var html = '<div id="q-text">' + symbol + ' (' + currentNum + '號) 的組態？</div>';
        
        // 製作選項
        var options = [correctConfig];
        while (options.length < 4) {
            var randomNum = Math.floor(Math.random() * 30) + 1;
            var randomConfig = elements[randomNum][1];
            if (options.indexOf(randomConfig) === -1) {
                options.push(randomConfig);
            }
        }
        options.sort(function() { return 0.5 - Math.random(); });

        // 建立按鈕 HTML
        for (var i = 0; i < options.length; i++) {
            html += '<button class="opt-btn" onclick="check(\'' + options[i] + '\', \'' + correctConfig + '\')">' + options[i] + '</button>';
        }

        document.getElementById('main-area').innerHTML = html;
    }

    function check(selected, correct) {
        if (selected === correct) {
            score++;
            document.getElementById('feedback').innerText = "答對了！";
            document.getElementById('feedback').style.color = "green";
        } else {
            document.getElementById('feedback').innerText = "答錯！正確是 " + correct;
            document.getElementById('feedback').style.color = "red";
        }
        document.getElementById('score').innerText = score;
        
        // 1秒後下一題
        setTimeout(renderQuestion, 1000);
    }
</script>

</body>
</html>
